<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SAYAC - Monolith</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#5b0017",
                        "surface-container-high": "#28283d",
                        "secondary": "#66dca9",
                        "on-tertiary-container": "#00311c",
                        "inverse-primary": "#b71d3f",
                        "surface-container": "#1e1e32",
                        "surface-container-lowest": "#0c0c1f",
                        "on-tertiary": "#003921",
                        "error-container": "#93000a",
                        "surface-dim": "#111125",
                        "secondary-fixed": "#84f8c4",
                        "tertiary-container": "#25a46d",
                        "surface-container-low": "#1a1a2e",
                        "on-error": "#690005",
                        "primary-container": "#fc536d",
                        "tertiary-fixed": "#84f9ba",
                        "secondary-container": "#22a476",
                        "tertiary-fixed-dim": "#67dc9f",
                        "tertiary": "#67dc9f",
                        "error": "#ffb4ab",
                        "on-secondary": "#003825",
                        "outline": "#a9898a",
                        "on-primary": "#67001c",
                        "surface-tint": "#ffb2b7",
                        "primary-fixed-dim": "#ffb2b7",
                        "secondary-fixed-dim": "#66dca9",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed-variant": "#005232",
                        "inverse-surface": "#e2e0fc",
                        "on-background": "#e2e0fc",
                        "surface-container-highest": "#333348",
                        "on-secondary-fixed-variant": "#005138",
                        "background": "#111125",
                        "surface": "#111125",
                        "primary": "#ffb2b7",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#333348",
                        "primary-fixed": "#ffdadb",
                        "outline-variant": "#5a4042",
                        "inverse-on-surface": "#2f2e43",
                        "surface-bright": "#37374d",
                        "on-secondary-container": "#003120",
                        "on-tertiary-fixed": "#002111",
                        "on-surface": "#e2e0fc",
                        "on-primary-fixed": "#40000e",
                        "on-surface-variant": "#e2bebf",
                        "on-primary-fixed-variant": "#91002b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .text-display-lg {
                font-size: 6rem; /* 96px */
                line-height: 1;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-white">
<!-- TopAppBar JSON Blueprint -->
<header class="flex justify-between items-center w-full px-8 py-6 bg-[#0c0c1f] z-20 sticky top-0">
<div class="text-[#fc536d] font-headline font-bold text-2xl tracking-widest select-none">
            SAYAC
        </div>
<div class="flex items-center gap-6">
<button class="text-[#37374d] hover:text-[#fc536d] transition-colors scale-95 active:duration-100 flex items-center justify-center outline-none">
<span class="material-symbols-outlined text-[28px]">history</span>
</button>
<button class="text-[#37374d] hover:text-[#fc536d] transition-colors scale-95 active:duration-100 flex items-center justify-center outline-none">
<span class="material-symbols-outlined text-[28px]">settings</span>
</button>
</div>
</header>
<!-- Canvas: The Kinetic Monolith -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-32 relative z-10">
<!-- Background Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary-container opacity-[0.03] blur-[100px] rounded-full pointer-events-none"></div>
<!-- Hero Counter Display -->
<div class="flex flex-col items-center mb-16 relative w-full">
<h1 class="font-headline font-bold text-display-lg tracking-tighter text-primary drop-shadow-[0_0_40px_rgba(255,178,183,0.1)] select-none">
                0
            </h1>
<div class="mt-4 flex gap-3">
<button class="bg-surface-container-high rounded-full px-4 py-1.5 font-label text-sm text-on-surface-variant hover:bg-surface-bright transition-colors">
                    +1
                </button>
<button class="bg-surface-container-high rounded-full px-4 py-1.5 font-label text-sm text-on-surface-variant hover:bg-surface-bright transition-colors">
                    +10
                </button>
</div>
</div>
<!-- Action Controls - Mobile Optimized (Vertical/Chunky) -->
<div class="w-full max-w-sm flex flex-col gap-5">
<!-- Primary Increment Action -->
<button class="w-full h-24 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold text-2xl flex flex-col items-center justify-center gap-1 shadow-[0_12px_40px_rgba(252,83,109,0.15)] hover:scale-[0.98] active:scale-95 transition-all outline-none">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">add</span>
<span class="tracking-wide">Arttir</span>
</button>
<!-- Secondary Actions Grid -->
<div class="grid grid-cols-2 gap-4 w-full">
<button class="h-20 rounded-xl bg-surface-container-highest text-on-surface font-body font-medium flex flex-col items-center justify-center gap-1 hover:bg-surface-bright active:scale-95 transition-all outline-none">
<span class="material-symbols-outlined">remove</span>
<span class="text-sm">Azalt</span>
</button>
<button class="h-20 rounded-xl bg-surface-container text-on-surface-variant font-body font-medium flex flex-col items-center justify-center gap-1 hover:bg-surface-container-high active:scale-95 transition-all outline-none">
<span class="material-symbols-outlined">refresh</span>
<span class="text-sm">Sifirla</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar JSON Blueprint (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0c0c1f]/80 backdrop-blur-xl rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.4)]">
<!-- Active Item: Sayaç -->
<button class="flex flex-col items-center justify-center bg-[#fc536d] text-white rounded-2xl px-6 py-2 transition-all scale-95 active:duration-150 outline-none w-24">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-body font-medium text-[10px] uppercase tracking-widest">Sayaç</span>
</button>
<!-- Inactive Item: Geçmiş -->
<button class="flex flex-col items-center justify-center text-[#37374d] px-6 py-2 hover:bg-[#1e1e32] rounded-2xl transition-all scale-95 active:duration-150 outline-none w-24">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-body font-medium text-[10px] uppercase tracking-widest">Geçmiş</span>
</button>
<!-- Inactive Item: Profil -->
<button class="flex flex-col items-center justify-center text-[#37374d] px-6 py-2 hover:bg-[#1e1e32] rounded-2xl transition-all scale-95 active:duration-150 outline-none w-24">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-body font-medium text-[10px] uppercase tracking-widest">Profil</span>
</button>
</nav>
</body></html>
