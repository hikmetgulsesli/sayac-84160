<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sayaç - Boş Durum</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#5b0017",
                        "surface-container-high": "#28283d",
                        "secondary": "#66dca9",
                        "on-tertiary-container": "#00311c",
                        "inverse-primary": "#b71d3f",
                        "surface-container": "#1e1e32",
                        "surface-container-lowest": "#0c0c1f",
                        "on-tertiary": "#003921",
                        "error-container": "#93000a",
                        "surface-dim": "#111125",
                        "secondary-fixed": "#84f8c4",
                        "tertiary-container": "#25a46d",
                        "surface-container-low": "#1a1a2e",
                        "on-error": "#690005",
                        "primary-container": "#fc536d",
                        "tertiary-fixed": "#84f9ba",
                        "secondary-container": "#22a476",
                        "tertiary-fixed-dim": "#67dc9f",
                        "tertiary": "#67dc9f",
                        "error": "#ffb4ab",
                        "on-secondary": "#003825",
                        "outline": "#a9898a",
                        "on-primary": "#67001c",
                        "surface-tint": "#ffb2b7",
                        "primary-fixed-dim": "#ffb2b7",
                        "secondary-fixed-dim": "#66dca9",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed-variant": "#005232",
                        "inverse-surface": "#e2e0fc",
                        "on-background": "#e2e0fc",
                        "surface-container-highest": "#333348",
                        "on-secondary-fixed-variant": "#005138",
                        "background": "#111125",
                        "surface": "#111125",
                        "primary": "#ffb2b7",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#333348",
                        "primary-fixed": "#ffdadb",
                        "outline-variant": "#5a4042",
                        "inverse-on-surface": "#2f2e43",
                        "surface-bright": "#37374d",
                        "on-secondary-container": "#003120",
                        "on-tertiary-fixed": "#002111",
                        "on-surface": "#e2e0fc",
                        "on-primary-fixed": "#40000e",
                        "on-surface-variant": "#e2bebf",
                        "on-primary-fixed-variant": "#91002b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-white">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-8 py-6 bg-[#0c0c1f] top-0 w-full z-40">
<div class="text-[#fc536d] font-bold text-2xl tracking-widest font-headline">SAYAC</div>
<div class="flex items-center gap-6">
<button class="text-[#ffb2b7] hover:text-[#fc536d] transition-colors scale-95 active:duration-100 flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[28px]">history</span>
</button>
<button class="text-[#ffb2b7] hover:text-[#fc536d] transition-colors scale-95 active:duration-100 flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-[28px]">settings</span>
</button>
</div>
</header>
<!-- Main Canvas: The Monolith -->
<main class="flex-1 flex flex-col items-center justify-center relative px-8 pb-32">
<!-- Ambient Glow behind counter -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
<div class="w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
</div>
<!-- The Kinetic Monolith Counter -->
<div class="relative z-10 flex flex-col items-center mb-16">
<h1 class="text-[140px] leading-none font-headline font-bold text-surface-tint tracking-tighter drop-shadow-lg tabular-nums">
                0
            </h1>
<p class="font-label text-lg text-on-surface-variant mt-6 tracking-wide uppercase">
                Henüz başlanmadı
            </p>
</div>
<!-- Primary Action -->
<div class="relative z-10 flex flex-col items-center gap-8 mt-8">
<button class="group relative flex items-center justify-center w-40 h-40 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_12px_40px_rgba(252,83,109,0.3)] hover:shadow-[0_20px_50px_rgba(252,83,109,0.5)] transform hover:-translate-y-1 active:scale-95 transition-all duration-300">
<div class="absolute inset-2 rounded-full border border-white/20"></div>
<span class="material-symbols-outlined text-on-primary-container text-[64px] font-light group-hover:scale-110 transition-transform duration-300">add</span>
</button>
<span class="font-headline font-semibold text-xl text-primary tracking-wide">
                Arttır
            </span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#0c0c1f]/80 backdrop-blur-xl rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.4)] md:hidden">
<!-- Active Item: Sayaç -->
<button class="flex flex-col items-center justify-center bg-[#fc536d] text-white rounded-2xl px-6 py-2 transition-all scale-95 active:duration-150">
<span class="material-symbols-outlined text-[28px] mb-1" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Sayaç</span>
</button>
<!-- Inactive Item: Geçmiş -->
<button class="flex flex-col items-center justify-center text-[#37374d] px-6 py-2 hover:bg-[#1e1e32] rounded-2xl scale-95 active:duration-150 transition-transform">
<span class="material-symbols-outlined text-[28px] mb-1">history</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Geçmiş</span>
</button>
<!-- Inactive Item: Profil -->
<button class="flex flex-col items-center justify-center text-[#37374d] px-6 py-2 hover:bg-[#1e1e32] rounded-2xl scale-95 active:duration-150 transition-transform">
<span class="material-symbols-outlined text-[28px] mb-1">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-widest">Profil</span>
</button>
</nav>
<!-- Overlay for Web to hide Bottom Nav (Simulated responsiveness rule) -->
<nav class="hidden md:flex fixed top-0 inset-x-0 w-full h-0 pointer-events-none"></nav>
</body></html>
