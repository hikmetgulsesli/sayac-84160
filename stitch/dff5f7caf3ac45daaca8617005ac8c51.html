<!DOCTYPE html>

<body class="bg-background text-on-surface font-body h-screen flex flex-col overflow-hidden antialiased select-none">

<header class="bg-[#0c0c1f] flex justify-between items-center w-full px-8 py-6 w-full top-0 flat no-border">
<div class="flex items-center">
<span class="text-[#fc536d] font-bold text-2xl tracking-widest font-['Space_Grotesk']">SAYAC</span>

<button class="text-[#37374d] hover:text-[#fc536d] transition-colors scale-95 active:duration-100 flex items-center justify-center w-10 h-10 rounded-full">

<span class="font-label font-medium text-sm text-on-surface-variant tracking-wider uppercase">Azalt</span>
</button>

</button>

<button class="flex flex-col items-center justify-center bg-[#fc536d] text-white rounded-2xl px-6 py-2 transition-all scale-95 active:duration-150 transition-transform w-24">
